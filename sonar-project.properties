# SonarCloud configuration
# Replace YOUR_GITHUB_USERNAME and YOUR_PROJECT_KEY with your actual values

sonar.projectKey=YOUR_GITHUB_USERNAME_cicd-showcase
sonar.organization=YOUR_SONAR_ORGANIZATION
sonar.projectName=CI/CD Showcase
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=frontend/src,backend
sonar.tests=frontend/src

# Language settings
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.testExecutionReportPaths=frontend/coverage/test-report.xml

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/dist/**,\
  **/*.test.js,\
  **/*.test.jsx,\
  **/coverage/**,\
  infra/**,\
  backend/build/**

sonar.coverage.exclusions=\
  **/index.js,\
  **/*.test.js,\
  **/*.test.jsx

# Quality gate — blocks pipeline if not met
sonar.qualitygate.wait=true

# C++ analysis
sonar.cfamily.compile-commands=backend/build/compile_commands.json
