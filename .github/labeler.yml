# .github/labeler.yml — Auto-labels PRs based on changed file paths

frontend:
  - changed-files:
      - any-glob-to-any-file: 'frontend/**'

backend:
  - changed-files:
      - any-glob-to-any-file: 'backend/**'

infrastructure:
  - changed-files:
      - any-glob-to-any-file: 'infra/**'

ci/cd:
  - changed-files:
      - any-glob-to-any-file: '.github/**'

docker:
  - changed-files:
      - any-glob-to-any-file:
          - 'frontend/Dockerfile'
          - 'docker/**'
          - 'docker-compose.yml'

documentation:
  - changed-files:
      - any-glob-to-any-file: '**/*.md'

monitoring:
  - changed-files:
      - any-glob-to-any-file: 'monitoring/**'
