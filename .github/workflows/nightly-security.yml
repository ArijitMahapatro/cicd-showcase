name: Nightly Security Scan

# Runs every night at 2 AM UTC — simulates production health monitoring
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  DOCKER_FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cicd-showcase-frontend
  DOCKER_BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cicd-showcase-backend

jobs:

  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  image-scan-frontend:
    name: Container Scan — Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Trivy scan — frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_FRONTEND_IMAGE }}:latest
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

  image-scan-backend:
    name: Container Scan — Backend
    runs-on: ubuntu-latest
    steps:
      - name: Trivy scan — backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_BACKEND_IMAGE }}:latest
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

  notify-on-failure:
    name: Notify on Scan Failure
    runs-on: ubuntu-latest
    needs: [dependency-audit, image-scan-frontend, image-scan-backend]
    if: failure()
    steps:
      - name: Create GitHub issue on vulnerability found
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security scan failed — ${new Date().toISOString().split('T')[0]}`,
              body: `Nightly security scan detected vulnerabilities.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['security', 'automated']
            })
