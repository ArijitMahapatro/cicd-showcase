name: CD Pipeline — Deploy

# ── Only runs after CI passes on main ─────────────────────────────────────
on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, prod]
      image_tag:
        description: 'Docker image tag to deploy'
        required: false
        default: 'latest'

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false   # never cancel an in-flight deploy

env:
  DOCKER_FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cicd-showcase-frontend
  DOCKER_BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cicd-showcase-backend
  IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}

jobs:

# ── Gate: only deploy if CI succeeded ────────────────────────────────────
  check-ci:
    name: Check CI Status
    runs-on: ubuntu-latest
    steps:
      - name: Fail if CI failed
        if: ${{ github.event.workflow_run.conclusion == 'failure' }}
        run: |
          echo "CI pipeline failed — deployment blocked."
          exit 1

      - name: CI passed — proceeding
        run: echo "CI pipeline passed. Proceeding with deployment."

# ── Deploy to staging ─────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: check-ci
    environment:
      name: staging
      url: https://staging.cicd-showcase.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Apply — Staging
        working-directory: infra/terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_environment: staging
          TF_VAR_app_version: ${{ env.IMAGE_TAG }}
        run: |
          terraform init -backend=false
          terraform apply -auto-approve \
            -var="environment=staging" \
            -var="app_version=${{ env.IMAGE_TAG }}"
        continue-on-error: true

      - name: Deploy via Ansible
        uses: dawidd6/action-ansible-playbook@v2
        with:
          playbook: infra/ansible/playbook.yml
          inventory: infra/ansible/inventory/hosts.yml
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          options: |
            --extra-vars "app_version=${{ env.IMAGE_TAG }}"
            --extra-vars "env=staging"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Health check — staging
        run: |
          echo "Checking staging health..."
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.cicd-showcase.example.com/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed (HTTP $STATUS) — retrying in 15s..."
            sleep 15
          done
          echo "Staging health check failed after 5 attempts"
          exit 1
        continue-on-error: true

# ── Manual approval gate before production ───────────────────────────────
  approve-production:
    name: Await Production Approval
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production         # requires manual approval in GitHub Environments settings
    steps:
      - name: Approved for production
        run: echo "Production deployment approved by ${{ github.actor }}"

# ── Deploy to production ──────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: approve-production
    environment:
      name: production
      url: https://cicd-showcase.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Apply — Production
        working-directory: infra/terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_environment: prod
          TF_VAR_app_version: ${{ env.IMAGE_TAG }}
        run: |
          terraform init -backend=false
          terraform apply -auto-approve \
            -var="environment=prod" \
            -var="app_version=${{ env.IMAGE_TAG }}"
        continue-on-error: true

      - name: Deploy via Ansible — Production
        uses: dawidd6/action-ansible-playbook@v2
        with:
          playbook: infra/ansible/playbook.yml
          inventory: infra/ansible/inventory/hosts.yml
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          options: |
            --extra-vars "app_version=${{ env.IMAGE_TAG }}"
            --extra-vars "env=production"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Health check — production
        run: |
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://cicd-showcase.example.com/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Attempt $i — HTTP $STATUS. Retrying..."
            sleep 20
          done
          echo "Production health check FAILED — triggering rollback"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed. Rolling back to previous image..."
          # In real scenario: re-deploy previous stable image tag
          echo "Rollback command would execute here"
          echo "::error::Production deployment failed. Manual intervention required."
