# prometheus.yml — Prometheus scrape configuration
# Demonstrates: monitoring integration with CI/CD pipeline health

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: 'cicd-showcase'
    environment: 'production'

# Alerting rules file
rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:

  # Frontend nginx metrics
  - job_name: 'frontend'
    static_configs:
      - targets: ['frontend:80']
    metrics_path: /metrics

  # Backend C++ service
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8080']
    metrics_path: /metrics

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter — host metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
