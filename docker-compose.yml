version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_VERSION: ${APP_VERSION:-1.0.0}
        REACT_APP_ENV: ${APP_ENV:-development}
    image: cicd-showcase-frontend:local
    container_name: showcase-frontend
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    image: cicd-showcase-backend:local
    container_name: showcase-backend
    ports:
      - "8080:8080"
    restart: unless-stopped

networks:
  default:
    name: cicd-showcase-network
