---
# roles/common/tasks/main.yml
# Base system configuration — runs on every server

- name: Install essential packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - unzip
      - htop
      - vim
      - ca-certificates
      - gnupg
      - lsb-release
    state: present

- name: Set timezone to UTC
  community.general.timezone:
    name: UTC

- name: Configure sysctl for performance
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    - { key: "net.core.somaxconn", value: "65535" }
    - { key: "vm.swappiness", value: "10" }

- name: Ensure firewall allows HTTP/HTTPS
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "80"
    - "443"
    - "22"

- name: Enable UFW
  community.general.ufw:
    state: enabled
    policy: deny
